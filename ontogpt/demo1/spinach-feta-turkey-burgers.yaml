input_text: |-
  # Spinach and Feta Turkey Burgers

  These spinach and feta turkey burgers are a big hit in the summertime when everyone is tired of the same old
  hamburgers and hot dogs. Serve with or without buns and your favorite condiments. I like to serve these with lettuce,
  tomato, and tzatziki sauce.

  Submitted by FoodieGeek | Tested by Allrecipes Test Kitchen

  Prep Time: 20 mins
  Cook Time: 15 mins
  Total Time: 35 mins
  Servings: 8
  Yield: 8 turkey burgers

  ## Ingredients:
  - cooking spray
  - 2 pounds ground turkey
  - 1 (10 ounce) box frozen chopped spinach, thawed and squeezed dry
  - 4 ounces feta cheese
  - 2 large eggs, beaten
  - 2 cloves garlic, minced

  ## Directions:

  ### Step 1
  Preheat an outdoor grill for medium-high heat and lightly oil the grate.

  ### Step 2
  Mix together turkey, spinach, feta, eggs, and garlic in a large bowl until well combined; form into 8 patties.

  ### Step 3
  Cook patties on the preheated grill on both sides until no longer pink in the center, 15 to 20 minutes. An instant-read
  thermometer inserted into the center of patties should read at least 165 degrees F (74 degrees C).


  Source: https://www.allrecipes.com/recipe/158968/spinach-and-feta-turkey-burgers
